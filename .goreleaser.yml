version: 2

project_name: dune-cli

env:
  - AMPLITUDE_KEY={{ if index .Env "AMPLITUDE_KEY" }}{{ .Env.AMPLITUDE_KEY }}{{ end }}

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd
    binary: dune
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
      - -X main.amplitudeKey={{ .Env.AMPLITUDE_KEY }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: duneanalytics
    name: cli
  draft: false
  prerelease: auto
  extra_files:
    - glob: install.sh
